<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Herbert</title>
    <style>
      :root {
        --bg: #0a0e10;
        --fg: #dde3ea;
        --accent: #6bcaff;
        --warn: #ffaa44;
        --err:  #ff5577;
        --mono: "JetBrains Mono", "SF Mono", Menlo, Consolas, monospace;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: var(--bg);
        color: var(--fg);
        font-family: var(--mono);
        overflow: hidden;
      }
      #app {
        display: grid;
        grid-template-columns: 3fr 2fr;
        grid-template-rows: 1fr auto;
        height: 100vh;
        gap: 8px;
        padding: 8px;
      }
      #stage {
        grid-column: 1;
        grid-row: 1 / span 2;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #070a0c;
        border: 1px solid #1a2128;
        image-rendering: pixelated;
        position: relative;
      }
      #stage canvas { display: block; image-rendering: pixelated; }
      #transcript {
        grid-column: 2;
        grid-row: 1;
        overflow-y: auto;
        padding: 16px 14px;
        background: #070a0c;
        border: 1px solid #1a2128;
        font-size: 13px;
        line-height: 1.55;
      }
      #transcript .turn {
        margin-bottom: 20px;
        padding-bottom: 20px;
        border-bottom: 1px solid #12181d;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      #transcript .turn:last-child {
        border-bottom: none;
        margin-bottom: 0;
        padding-bottom: 0;
      }
      #transcript .user,
      #transcript .assistant {
        padding-left: 10px;
        border-left: 2px solid;
      }
      #transcript .user { border-color: #3a4550; color: var(--fg); }
      #transcript .assistant { border-color: var(--accent); color: var(--accent); }
      #transcript .role {
        color: #6a7a86;
        text-transform: uppercase;
        font-size: 9px;
        letter-spacing: 1.5px;
        margin-bottom: 5px;
      }
      #transcript .assistant-body,
      #transcript .user > div:not(.role) {
        white-space: pre-wrap;
        word-break: break-word;
      }
      #statusbar {
        grid-column: 2;
        grid-row: 2;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 8px 12px;
        background: #070a0c;
        border: 1px solid #1a2128;
        font-size: 11px;
        color: #6a7a86;
      }
      #statusbar .state { color: var(--fg); }
      #latency.miss { color: var(--warn); }
      #boot {
        position: absolute;
        inset: 0;
        background: var(--bg);
        color: var(--accent);
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 40px;
        font-size: 16px;
        line-height: 1.6;
        white-space: pre;
        z-index: 10;
        transition: opacity 400ms ease;
      }
      #boot.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #diagnostic {
        position: absolute;
        inset: 0;
        background: var(--bg);
        padding: 12px;
        overflow-y: auto;
        font-size: 11px;
        z-index: 5;
        display: none;
      }
      #diagnostic.visible { display: block; }
      #diagnostic .error-banner {
        position: sticky;
        top: 0;
        background: var(--err);
        color: #000;
        padding: 6px 10px;
        margin: -12px -12px 12px;
        font-weight: bold;
      }
      #diagnostic .log-line { color: #9aa8b4; margin-bottom: 2px; }
      #diagnostic .log-line.WARN { color: var(--warn); }
      #diagnostic .log-line.ERROR { color: var(--err); }
      #error-badge {
        position: absolute;
        top: 8px;
        right: 8px;
        background: var(--err);
        color: #000;
        padding: 4px 8px;
        font-size: 11px;
        font-weight: bold;
        display: none;
      }
      #error-badge.visible { display: block; }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="stage">
        <div id="boot"></div>
        <div id="diagnostic"></div>
        <div id="error-badge"></div>
      </div>
      <div id="transcript"></div>
      <div id="statusbar">
        <span>state: <span id="state" class="state">idle</span></span>
        <span id="latency"></span>
        <span id="conn">connecting...</span>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
