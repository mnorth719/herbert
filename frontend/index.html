<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Herbert</title>
    <style>
      :root {
        --bg: #0a0e10;
        --fg: #dde3ea;
        --accent: #6bcaff;
        --warn: #ffaa44;
        --err:  #ff5577;
        --mono: "JetBrains Mono", "SF Mono", Menlo, Consolas, monospace;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: var(--bg);
        color: var(--fg);
        font-family: var(--mono);
        overflow: hidden;
      }
      #app {
        display: grid;
        grid-template-columns: 3fr 2fr;
        grid-template-rows: 1fr auto;
        height: 100vh;
        gap: 8px;
        padding: 8px;
      }
      #stage {
        grid-column: 1;
        grid-row: 1 / span 2;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #070a0c;
        border: 1px solid #1a2128;
        image-rendering: pixelated;
        position: relative;
      }
      #stage canvas { display: block; image-rendering: pixelated; }
      #transcript {
        grid-column: 2;
        grid-row: 1;
        overflow-y: auto;
        padding: 16px 14px;
        background: #070a0c;
        border: 1px solid #1a2128;
        font-size: 13px;
        line-height: 1.55;
      }
      #transcript .turn {
        margin-bottom: 20px;
        padding-bottom: 20px;
        border-bottom: 1px solid #12181d;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      #transcript .turn:last-child {
        border-bottom: none;
        margin-bottom: 0;
        padding-bottom: 0;
      }
      #transcript .user,
      #transcript .assistant {
        padding-left: 10px;
        border-left: 2px solid;
      }
      #transcript .user { border-color: #3a4550; color: var(--fg); }
      #transcript .assistant { border-color: var(--accent); color: var(--accent); }
      #transcript .role {
        color: #6a7a86;
        text-transform: uppercase;
        font-size: 9px;
        letter-spacing: 1.5px;
        margin-bottom: 5px;
      }
      #transcript .assistant-body,
      #transcript .user > div:not(.role) {
        white-space: pre-wrap;
        word-break: break-word;
      }
      #statusbar {
        grid-column: 2;
        grid-row: 2;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 8px 12px;
        background: #070a0c;
        border: 1px solid #1a2128;
        font-size: 11px;
        color: #6a7a86;
      }
      #statusbar .state { color: var(--fg); }
      #latency.miss { color: var(--warn); }
      #boot {
        position: absolute;
        inset: 0;
        background: var(--bg);
        color: var(--accent);
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 40px;
        font-size: 16px;
        line-height: 1.6;
        white-space: pre;
        z-index: 10;
        transition: opacity 400ms ease;
      }
      #boot.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #diagnostic {
        position: absolute;
        inset: 0;
        background: var(--bg);
        padding: 12px;
        overflow-y: auto;
        font-size: 11px;
        z-index: 5;
        display: none;
      }
      #diagnostic.visible { display: block; }
      #diagnostic .diag-section {
        margin-bottom: 14px;
        padding: 8px 10px;
        background: #0d1318;
        border: 1px solid #1a2128;
      }
      #diagnostic .diag-section h3 {
        margin: 0 0 8px 0;
        font-size: 10px;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: #6a7a86;
      }
      #diagnostic .diag-kv { width: 100%; font-size: 11px; }
      #diagnostic .diag-kv td {
        padding: 2px 8px;
        vertical-align: top;
      }
      #diagnostic .diag-kv td:first-child {
        color: #6a7a86;
        text-transform: uppercase;
        font-size: 9px;
        letter-spacing: 0.5px;
        white-space: nowrap;
        padding-top: 4px;
      }
      #diagnostic .diag-kv td:last-child {
        color: var(--fg);
        font-family: var(--mono);
        word-break: break-all;
      }
      #diagnostic .diag-prompt {
        margin-top: 10px;
        border-top: 1px dashed #1a2128;
        padding-top: 8px;
      }
      #diagnostic .diag-prompt summary {
        cursor: pointer;
        color: var(--accent);
        font-size: 10px;
        letter-spacing: 0.5px;
        text-transform: uppercase;
      }
      #diagnostic .diag-prompt pre {
        margin: 8px 0 0;
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 11px;
        line-height: 1.5;
        color: #c8d2db;
      }
      #diagnostic #diag-log-body { max-height: 400px; overflow-y: auto; }
      #diagnostic .prompt-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 8px;
      }
      #diagnostic .prompt-header h3 { margin: 0; }
      #diagnostic .prompt-header-right {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      #diagnostic #diag-prompt-stamp {
        color: #6a7a86;
        font-size: 10px;
        transition: opacity 200ms ease;
      }
      #diagnostic #diag-prompt-stamp.stale { opacity: 0.5; }
      #diagnostic #diag-prompt-refresh {
        background: #0d1318;
        color: var(--accent);
        border: 1px solid #1a2128;
        padding: 3px 8px;
        font-family: var(--mono);
        font-size: 10px;
        cursor: pointer;
      }
      #diagnostic #diag-prompt-refresh:hover { background: #14202a; }
      #diagnostic .prompt-collapsible {
        margin-bottom: 8px;
        border-bottom: 1px dashed #1a2128;
        padding-bottom: 8px;
      }
      #diagnostic .prompt-collapsible summary {
        cursor: pointer;
        color: var(--accent);
        font-size: 10px;
        letter-spacing: 0.5px;
        text-transform: uppercase;
      }
      #diagnostic .prompt-collapsible pre {
        margin: 8px 0 0;
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 11px;
        line-height: 1.5;
        color: #c8d2db;
      }
      #diagnostic .prompt-subsection {
        margin-bottom: 10px;
        padding-bottom: 8px;
        border-bottom: 1px dashed #1a2128;
      }
      #diagnostic .prompt-subsection:last-of-type { border-bottom: none; }
      #diagnostic .prompt-subheader {
        color: #6a7a86;
        text-transform: uppercase;
        font-size: 9px;
        letter-spacing: 1px;
        margin-bottom: 5px;
      }
      #diagnostic .prompt-bullet-list {
        margin: 0; padding-left: 16px;
        color: #c8d2db;
        font-size: 11px;
        line-height: 1.5;
      }
      #diagnostic .prompt-summary-list {
        margin: 0;
        font-size: 11px;
        line-height: 1.5;
      }
      #diagnostic .prompt-summary-list dt {
        color: #6a7a86;
        font-size: 9px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      #diagnostic .prompt-summary-list dd {
        margin: 0 0 6px 0;
        color: #c8d2db;
      }
      #diagnostic .prompt-live-messages {
        margin: 0; padding-left: 20px;
        max-height: 240px; overflow-y: auto;
        font-size: 11px;
        line-height: 1.5;
      }
      #diagnostic .prompt-live-messages li { margin-bottom: 6px; }
      #diagnostic .live-msg-role {
        display: inline-block;
        text-transform: uppercase;
        font-size: 9px;
        letter-spacing: 1px;
        margin-right: 6px;
      }
      #diagnostic .live-msg.role-user .live-msg-role { color: #9aa8b4; }
      #diagnostic .live-msg.role-assistant .live-msg-role { color: var(--accent); }
      #diagnostic .live-msg-content { color: #c8d2db; white-space: pre-wrap; word-break: break-word; }
      #diagnostic .prompt-empty { color: #6a7a86; font-style: italic; font-size: 11px; }
      #diagnostic .prompt-error { color: var(--warn); font-size: 11px; }
      #diagnostic .prompt-total {
        margin-top: 8px;
        color: var(--accent);
        font-size: 11px;
        text-align: right;
      }
      #diagnostic .error-banner {
        position: sticky;
        top: 0;
        background: var(--err);
        color: #000;
        padding: 6px 10px;
        margin: -12px -12px 12px;
        font-weight: bold;
      }
      #diagnostic .log-line { color: #9aa8b4; margin-bottom: 2px; }
      #diagnostic .log-line.WARN { color: var(--warn); }
      #diagnostic .log-line.ERROR { color: var(--err); }
      #error-badge {
        position: absolute;
        top: 8px;
        right: 8px;
        background: var(--err);
        color: #000;
        padding: 4px 8px;
        font-size: 11px;
        font-weight: bold;
        display: none;
      }
      #error-badge.visible { display: block; }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="stage">
        <div id="boot"></div>
        <div id="diagnostic"></div>
        <div id="error-badge"></div>
      </div>
      <div id="transcript"></div>
      <div id="statusbar">
        <span>state: <span id="state" class="state">idle</span></span>
        <span id="latency"></span>
        <span id="conn">connecting...</span>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
